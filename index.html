<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>VIMUL Employee Tracking</title>

<link rel="stylesheet" href="employee.css">

</head>

<body>

<div class="app">

<header>

<div class="logo">

<img src="logo.png">

</div>

<div>

<h2>VIMUL LIVE TRACKING</h2>

<p>Employee Mobile Application</p>

</div>

</header>

<!-- LOGIN SCREEN -->

<div id="loginScreen">

<div class="card">

<h3>Employee Login</h3>

<input
type="text"
id="employeeId"
placeholder="Employee ID">

<input
type="password"
id="password"
placeholder="Password">

<button
class="btnPrimary"
onclick="login()">

Login

</button>

<div id="loginMessage"></div>

</div>

</div>

<!-- EMPLOYEE SCREEN -->

<div
id="employeeScreen"
style="display:none;">

<div class="card">

<h3 id="employeeName"></h3>

<p>

Status

<span id="status">

Not Checked In

</span>

</p>

<p>

Current Time

<span id="clock"></span>

</p>

<p>

GPS

<span id="gpsStatus">

Waiting...

</span>

</p>

<p>

Latitude

<span id="latitude">

0

</span>

</p>

<p>

Longitude

<span id="longitude">

0

</span>

</p>

<p>

Accuracy

<span id="accuracy">

0

</span>

m

</p>

<p>

Battery

<span id="battery">

0

</span>

%

</p>

</div>

<div class="buttons">

<button
class="green"
onclick="checkIn()">

CHECK IN

</button>

<button
class="red"
onclick="checkOut()">

CHECK OUT

</button>

</div>

<div class="footer">

Tracking starts automatically
after Login.

Location updates every
30 seconds.

</div>

</div>

</div>

<script src="employee.js"></script>
<script src="api.js"></script>
<script src="auth.js"></script>
<script src="tracking.js"></script>
<script src="attendance.js"></script>

</body>

</html>
